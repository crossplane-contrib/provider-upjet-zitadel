name: Append xpkg Extensions

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag of the published package to append extensions to (e.g. v0.1.1)"
        required: true

permissions:
  contents: read

jobs:
  append-extensions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Append extensions
        uses: ./.github/actions/append-xpkg-extensions
        with:
          package: xpkg.upbound.io/crossplane-contrib/provider-upjet-zitadel
          version: ${{ github.event.inputs.version }}
          xpkg-access-id: ${{ secrets.XPKG_ACCESS_ID }}
          xpkg-token: ${{ secrets.XPKG_TOKEN }}
