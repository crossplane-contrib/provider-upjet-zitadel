name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
      message:
        description: 'Tag message'
        required: true

jobs:
  tag:
    uses: upbound/official-providers-ci/.github/workflows/provider-tag.yml@b09e9133ee577034357057240aa948933d84b002 # main
    with:
      version: ${{ github.event.inputs.version }}
      message: ${{ github.event.inputs.message }}
