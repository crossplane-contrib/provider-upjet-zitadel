name: Append xpkg Extensions
description: Append extensions (e.g. marketplace icons) to a published Crossplane package using `up alpha xpkg append`.

inputs:
  package:
    description: 'Full package reference without the version tag (e.g. xpkg.upbound.io/crossplane-contrib/provider-upjet-zitadel)'
    required: true
  version:
    description: 'Version tag of the package to append extensions to'
    required: true
  extensions-root:
    description: 'Path to the extensions directory'
    required: false
    default: './extensions'
  registry:
    description: 'OCI registry to authenticate against'
    required: false
    default: 'xpkg.upbound.io'
  xpkg-access-id:
    description: 'Robot ID or access ID for registry authentication'
    required: true
  xpkg-token:
    description: 'API token for registry authentication'
    required: true

runs:
  using: composite
  steps:
    - name: Install and login with up
      uses: upbound/action-up@53fe6395637d884c80d2bbc8c2d75d0ece776ced # v1
      with:
        api-token: ${{ inputs.xpkg-token }}

    - name: Login to registry
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.xpkg-access-id }}
        password: ${{ inputs.xpkg-token }}

    - name: Append extensions to package
      shell: bash
      run: |
        up alpha xpkg append \
          --extensions-root=${{ inputs.extensions-root }} \
          ${{ inputs.package }}:${{ inputs.version }}
