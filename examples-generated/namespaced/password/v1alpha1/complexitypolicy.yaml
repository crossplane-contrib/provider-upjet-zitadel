apiVersion: password.zitadel.m.crossplane.io/v1alpha1
kind: ComplexityPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: password/v1alpha1/complexitypolicy
  labels:
    testing.upbound.io/example-name: default
  name: default
  namespace: crossplane-system
spec:
  forProvider:
    hasLowercase: true
    hasNumber: true
    hasSymbol: true
    hasUppercase: true
    minLength: "8"
    orgId: ${data.zitadel_org.default.id}
