apiVersion: org.zitadel.m.crossplane.io/v1alpha1
kind: IdpGithubEs
metadata:
  annotations:
    meta.upbound.io/example-id: org/v1alpha1/idpgithubes
  labels:
    testing.upbound.io/example-name: default
  name: default
  namespace: crossplane-system
spec:
  forProvider:
    authorizationEndpoint: https://auth.endpoint
    autoLinking: AUTO_LINKING_OPTION_USERNAME
    clientId: 86a165...
    clientSecretSecretRef:
      key: example-key
      name: example-secret
    isAutoCreation: false
    isAutoUpdate: true
    isCreationAllowed: true
    isLinkingAllowed: false
    name: GitHub Enterprise Server
    orgId: ${data.zitadel_org.default.id}
    scopes:
    - openid
    - profile
    - email
    tokenEndpoint: https://token.endpoint
    userEndpoint: https://user.endpoint
