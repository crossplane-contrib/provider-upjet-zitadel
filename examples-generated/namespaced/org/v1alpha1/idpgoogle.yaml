apiVersion: org.zitadel.m.crossplane.io/v1alpha1
kind: IdpGoogle
metadata:
  annotations:
    meta.upbound.io/example-id: org/v1alpha1/idpgoogle
  labels:
    testing.upbound.io/example-name: default
  name: default
  namespace: crossplane-system
spec:
  forProvider:
    autoLinking: AUTO_LINKING_OPTION_USERNAME
    clientId: 182902...
    clientSecretSecretRef:
      key: example-key
      name: example-secret
    isAutoCreation: false
    isAutoUpdate: true
    isCreationAllowed: true
    isLinkingAllowed: false
    name: Google
    orgId: ${data.zitadel_org.default.id}
    scopes:
    - openid
    - profile
    - email
