apiVersion: project.zitadel.crossplane.io/v1alpha1
kind: GrantMember
metadata:
  annotations:
    meta.upbound.io/example-id: project/v1alpha1/grantmember
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    grantId: "123456789012345678"
    orgId: ${data.zitadel_org.default.id}
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: zitadel_project
    roles:
    - PROJECT_GRANT_OWNER
    userId: ${data.zitadel_human_user.default.id}
