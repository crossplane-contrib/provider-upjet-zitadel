apiVersion: trigger.zitadel.crossplane.io/v1alpha1
kind: Actions
metadata:
  annotations:
    meta.upbound.io/example-id: trigger/v1alpha1/actions
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    actionIds:
    - ${data.zitadel_action.default.id}
    flowType: FLOW_TYPE_CUSTOMISE_TOKEN
    orgId: ${data.zitadel_org.default.id}
    triggerType: TRIGGER_TYPE_PRE_ACCESS_TOKEN_CREATION
